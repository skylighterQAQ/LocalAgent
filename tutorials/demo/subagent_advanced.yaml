# LocalAgent SubAgent 配置示例
# 
# 这是一个真实可用的工作流配置文件，展示如何通过 YAML 定义 SubAgent。
# 
# 功能：文本处理工作流
# 1. 读取输入文件
# 2. LLM 分析文本内容
# 3. LLM 生成摘要
# 4. 保存分析报告
#
# 使用方式：
#   from local_agent.subagent import load_subagent_from_file
#   agent = load_subagent_from_file('tutorials/demo/subagent_advanced.yaml')
#   result = agent.run(input_data={
#       'input_file': 'your_document.txt',
#       'output_file': 'analysis_report.md'
#   })

# SubAgent 基本信息
name: "text_processor"
description: "文本处理工作流 - 分析内容、生成摘要并保存报告"

# 工作流步骤（按顺序执行）
steps:
  # ========================================
  # 步骤 1: 读取输入文件
  # ========================================
  - type: "tool"
    name: "read_input"
    tool: "file_reader"
    params:
      # 使用 {input_file} 从输入数据中获取文件路径
      path: "{input_file}"
    # 将读取结果保存到变量 raw_text
    output_key: "raw_text"
    # 错误处理策略：raise（抛出异常）或 continue（继续执行）
    on_error: "raise"

  # ========================================
  # 步骤 2: 使用 LLM 分析文本
  # ========================================
  - type: "llm"
    name: "analyze_content"
    # LLM 配置
    model: "qwen2.5:7b"
    provider: "ollama"  # 可选：ollama 或 openai
    # 提示词（支持变量替换）
    prompt: |
      请分析以下文本内容，包括：
      1. 主要主题和关键信息
      2. 文本结构和特点
      3. 可能的改进建议
      
      文本内容：
      {raw_text}
      
      请用清晰的结构化方式回答。
    # 将分析结果保存到变量 analysis
    output_key: "analysis"
    on_error: "raise"

  # ========================================
  # 步骤 3: 生成简短摘要
  # ========================================
  - type: "llm"
    name: "generate_summary"
    model: "qwen2.5:7b"
    provider: "ollama"
    prompt: |
      基于以下详细分析，生成一个简短的摘要（3-5句话）：
      
      {analysis}
      
      请直接给出摘要内容，不需要额外解释。
    # 将摘要保存到变量 summary
    output_key: "summary"
    on_error: "raise"

  # ========================================
  # 步骤 4: 提取关键词
  # ========================================
  - type: "llm"
    name: "extract_keywords"
    model: "qwen2.5:7b"
    prompt: |
      从以下文本中提取 5-10 个关键词，用逗号分隔：
      
      {raw_text}
      
      只返回关键词列表，不需要额外说明。
    output_key: "keywords"
    on_error: "continue"  # 关键词提取失败不影响主流程

  # ========================================
  # 步骤 5: 保存分析报告
  # ========================================
  - type: "tool"
    name: "save_report"
    tool: "file_writer"
    params:
      # 使用 {output_file} 从输入数据中获取输出路径
      path: "{output_file}"
      # 组合多个变量生成报告内容
      content: |
        # 文本分析报告
        
        生成时间: {timestamp}
        
        ---
        
        ## 📝 摘要
        
        {summary}
        
        ---
        
        ## 🔍 详细分析
        
        {analysis}
        
        ---
        
        ## 🏷️ 关键词
        
        {keywords}
        
        ---
        
        ## 📄 原始文本
        
        ```
        {raw_text}
        ```
    on_error: "raise"

# ========================================
# 配置说明
# ========================================
#
# 步骤类型 (type)：
#   - "tool": 调用工具（支持本地工具和 MCP 工具）
#   - "llm": 调用大语言模型
#   - "subagent": 调用另一个 SubAgent
#
# LLM 配置：
#   - model: 模型名称（如 qwen2.5:7b, gpt-4）
#   - provider: 提供商（ollama 或 openai）
#   - prompt: 提示词（支持 {variable} 变量替换）
#
# 工具配置：
#   - tool: 工具名称（如 file_reader, file_writer）
#   - params: 工具参数字典（支持变量替换）
#
# 输出配置：
#   - output_key: 将步骤结果保存到指定变量
#   - on_error: 错误处理策略（raise 或 continue）
#
# 变量系统：
#   - 使用 {variable_name} 语法引用变量
#   - 支持嵌套变量和模板替换
#   - 所有步骤共享同一个执行上下文
#
# ========================================
# 使用示例
# ========================================
#
# Python 代码：
#
#   from local_agent.subagent import load_subagent_from_file
#   
#   # 加载配置
#   agent = load_subagent_from_file('tutorials/demo/subagent_advanced.yaml')
#   
#   # 执行工作流
#   result = agent.run(input_data={
#       'input_file': 'document.txt',
#       'output_file': 'report.md'
#   })
#   
#   # 查看结果
#   print(f"成功步骤: {result['summary']['success']}/{result['summary']['total_steps']}")
#   print(f"总耗时: {result['summary']['total_time']:.2f}秒")
#
# 命令行：
#
#   python -c "
#   from local_agent.subagent import load_subagent_from_file
#   agent = load_subagent_from_file('tutorials/demo/subagent_advanced.yaml')
#   result = agent.run(input_data={'input_file': 'test.txt', 'output_file': 'result.md'})
#   print('执行完成！')
#   "
#
# ========================================
# 自定义配置
# ========================================
#
# 1. 修改模型：
#    将 model: "qwen2.5:7b" 改为你拥有的模型
#
# 2. 切换到 OpenAI：
#    provider: "openai"
#    model: "gpt-4"
#    （需要设置 OPENAI_API_KEY 环境变量）
#
# 3. 添加步骤：
#    在 steps 列表中添加新的步骤配置
#
# 4. 调整提示词：
#    修改 prompt 字段以适应你的需求
#
# 5. 修改错误处理：
#    on_error: "continue" 允许步骤失败后继续执行
